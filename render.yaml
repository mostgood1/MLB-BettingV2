services:
  - type: web
    name: mlb-betting-v2
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --max-requests 200 --max-requests-jitter 25
    disk:
      name: mlb-betting-v2-data
      mountPath: /opt/render/project/data
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MLB_BETTING_DATA_ROOT
        value: /opt/render/project/data
      - key: MLB_LIVE_LENS_DIR
        value: /opt/render/project/data/live_lens
      - key: MLB_ENABLE_LIVE_LENS_LOOP
        value: on
      - key: MLB_ENABLE_INLINE_SEASON_MANIFEST_REBUILD
        value: off
      - key: MLB_PERSON_CACHE_MAXSIZE
        value: "1024"
      - key: MLB_PERSON_GAMELOG_CACHE_MAXSIZE
        value: "512"
      - key: MLB_PERSON_SEASON_CACHE_MAXSIZE
        value: "1024"
      - key: MLB_JSON_FILE_CACHE_MAXSIZE
        value: "256"
      - key: MLB_JSON_FILE_CACHE_MAX_BYTES
        value: "786432"
      - key: MLB_CARDS_CACHE_TTL_SECONDS
        value: "60"
      - key: MLB_CARDS_CONTEXT_CACHE_TTL_SECONDS
        value: "60"
      - key: MLB_LIVE_LENS_LOOP_INTERVAL_SECONDS
        value: "30"
      - key: MLB_LIVE_LENS_REPORT_REFRESH_INTERVAL_SECONDS
        value: "120"
      - key: MLB_LIVE_LENS_REPORT_MAX_AGE_SECONDS
        value: "180"
      - key: MLB_LIVE_ODDSAPI_REFRESH_INTERVAL_SECONDS
        value: "90"
      - key: MLB_CRON_TOKEN
        sync: false
      - key: ODDS_API_KEY
        sync: false