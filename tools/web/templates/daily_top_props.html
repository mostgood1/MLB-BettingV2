<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} - {{ date }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cards.css', v='20260407-daily-top-props-v1') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='daily_top_props.css', v='20260407-daily-top-props-v2') }}" />
  </head>
  <body class="cards-body top-props-body">
    <div class="top-props-shell">
      <header class="top-props-header">
        <div class="top-props-title-block">
          <div class="top-props-kicker">Daily raw-edge prop board</div>
          <div class="top-props-title-row">
            <h1>{{ title }}</h1>
            <span class="cards-nav-pill is-active" id="topPropsDatePill">{{ date }}</span>
          </div>
          <p class="top-props-header-meta" id="topPropsHeaderMeta">Loading top-props board...</p>
        </div>
        <div class="top-props-header-actions">
          <a class="cards-nav-pill" href="/?date={{ date }}">Daily cards</a>
          {% if group == 'pitcher' %}
          <a class="cards-nav-pill" href="/hitter-top-props?date={{ date }}">Hitter top props</a>
          <a class="cards-nav-pill" href="/pitcher-ladders?date={{ date }}">Pitcher ladders</a>
          {% else %}
          <a class="cards-nav-pill" href="/pitcher-top-props?date={{ date }}">Pitcher top props</a>
          <a class="cards-nav-pill" href="/hitter-ladders?date={{ date }}">Hitter ladders</a>
          {% endif %}
          <a class="cards-nav-pill" href="/season/{{ season }}?date={{ date }}">Season review</a>
        </div>
      </header>

      <section class="cards-control-card top-props-controls" aria-label="Daily top props controls">
        <form class="cards-date-form top-props-form" method="get" action="/{{ group }}-top-props">
          <a class="cards-nav-pill" href="/{{ group }}-top-props?date={{ date }}" rel="prev" id="topPropsPrevLink">Prev</a>
          <span class="cards-nav-pill cards-form-pill" aria-hidden="true">Date</span>
          <input type="date" name="date" value="{{ date }}" aria-label="Top props date" id="topPropsDateInput" />
          <button type="submit">Load</button>
          <a class="cards-nav-pill" href="/{{ group }}-top-props?date={{ date }}" rel="next" id="topPropsNextLink">Next</a>
        </form>
        <div class="top-props-toolbar-meta">
          <label class="top-props-filter-control">
            <span class="top-props-filter-label">Stat</span>
            <select id="topPropsStatFilter" aria-label="Filter by stat" disabled>
              <option value="">Loading stats...</option>
            </select>
          </label>
          <label class="top-props-filter-control">
            <span class="top-props-filter-label">Game</span>
            <select id="topPropsGameFilter" aria-label="Filter by game" disabled>
              <option value="">All games</option>
            </select>
          </label>
          <div class="top-props-source-meta" id="topPropsSourceMeta"></div>
        </div>
      </section>

      <main class="top-props-grid" id="topPropsSections">
        <div class="cards-loading-state">Loading top-props board...</div>
      </main>
    </div>
    <script>
      window.MLBDailyTopPropsBootstrap = {
        group: {{ group|tojson }},
        groupLabel: {{ groupLabel|tojson }},
        title: {{ title|tojson }},
        date: {{ date|tojson }},
        season: {{ season|tojson }},
      };
    </script>
    <script src="{{ url_for('static', filename='daily_top_props.js', v='20260408-daily-top-props-v2') }}"></script>
  </body>
</html>
