name: MLB Live Lens Tick

on:
  workflow_dispatch: {}

concurrency:
  group: mlb-live-lens-tick
  cancel-in-progress: true

env:
  MLB_BETTING_BASE_URL: ${{ secrets['MLB_BETTING_BASE_URL'] }}
  RENDER_URL: ${{ secrets['RENDER_URL'] }}
  MLB_CRON_TOKEN: ${{ secrets['MLB_CRON_TOKEN'] }}
  MLB_BETTING_CRON_TOKEN: ${{ secrets['MLB_BETTING_CRON_TOKEN'] }}
  CRON_TOKEN: ${{ secrets['CRON_TOKEN'] }}

jobs:
  live-lens-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          test -n "${MLB_BETTING_BASE_URL:-${RENDER_URL:-}}" || (echo 'Missing MLB_BETTING_BASE_URL or RENDER_URL secret' && exit 1)
          test -n "${MLB_BETTING_CRON_TOKEN:-${MLB_CRON_TOKEN:-${CRON_TOKEN:-}}}" || (echo 'Missing MLB_BETTING_CRON_TOKEN, MLB_CRON_TOKEN, or CRON_TOKEN secret' && exit 1)

      - name: Tick live lens
        run: bash scripts/render_cron_call.sh "/api/cron/live-lens-tick"