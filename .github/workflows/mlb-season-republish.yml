name: MLB Season Republish

on:
  workflow_dispatch:
    inputs:
      rebuild_date:
        description: Optional single date to rebuild before republishing
        required: false
        default: ""
      rebuild_window_days:
        description: Recent-day rebuild window when rebuild_date is empty
        required: false
        default: "3"
      season:
        description: Season to republish
        required: true
        default: "2026"
      profile:
        description: Betting profile manifest to rebuild
        required: true
        default: retuned
  schedule:
    - cron: '30 11 * * *'

concurrency:
  group: mlb-season-republish
  cancel-in-progress: false

env:
  MLB_BETTING_BASE_URL: ${{ secrets.MLB_BETTING_BASE_URL }}
  RENDER_URL: ${{ secrets.RENDER_URL }}
  MLB_CRON_TOKEN: ${{ secrets.MLB_CRON_TOKEN }}
  MLB_BETTING_CRON_TOKEN: ${{ secrets.MLB_BETTING_CRON_TOKEN }}
  CRON_TOKEN: ${{ secrets.CRON_TOKEN }}

jobs:
  republish-season:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          test -n "${MLB_BETTING_BASE_URL:-${RENDER_URL:-}}" || (echo 'Missing MLB_BETTING_BASE_URL or RENDER_URL secret' && exit 1)
          test -n "${MLB_BETTING_CRON_TOKEN:-${MLB_CRON_TOKEN:-${CRON_TOKEN:-}}}" || (echo 'Missing MLB_BETTING_CRON_TOKEN, MLB_CRON_TOKEN, or CRON_TOKEN secret' && exit 1)

      - name: Ping Render cron surface
        run: bash scripts/render_cron_call.sh /api/cron/ping

      - name: Resolve rebuild inputs
        id: resolve
        shell: bash
        env:
          INPUT_REBUILD_DATE: ${{ github.event.inputs.rebuild_date }}
          INPUT_REBUILD_WINDOW_DAYS: ${{ github.event.inputs.rebuild_window_days }}
          INPUT_SEASON: ${{ github.event.inputs.season }}
          INPUT_PROFILE: ${{ github.event.inputs.profile }}
        run: |
          export TZ=America/Chicago

          rebuild_date="${INPUT_REBUILD_DATE}"
          if [[ -z "${rebuild_date}" ]]; then
            rebuild_window_days="${INPUT_REBUILD_WINDOW_DAYS}"
            if ! [[ "${rebuild_window_days}" =~ ^[0-9]+$ ]] || [[ "${rebuild_window_days}" -lt 1 ]]; then
              rebuild_window_days="3"
            fi
            rebuild_dates=""
            for ((offset=1; offset<=rebuild_window_days; offset++)); do
              rebuild_dates+="$(date -d "${offset} day ago" +%F)"$'\n'
            done
            rebuild_date="$(printf '%s' "${rebuild_dates}" | head -n 1)"
          else
            rebuild_dates="${rebuild_date}"
          fi

          season="${INPUT_SEASON}"
          if [[ -z "${season}" ]]; then
            season="$(date -d "${rebuild_date}" +%Y)"
          fi

          profile="${INPUT_PROFILE}"
          if [[ -z "${profile}" ]]; then
            profile="retuned"
          fi

          echo "rebuild_date=${rebuild_date}" >> "$GITHUB_OUTPUT"
          {
            echo "rebuild_dates<<EOF"
            printf '%s\n' "${rebuild_dates}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "season=${season}" >> "$GITHUB_OUTPUT"
          echo "profile=${profile}" >> "$GITHUB_OUTPUT"

      - name: Rebuild season day reports
        shell: bash
        run: |
          while IFS= read -r rebuild_date; do
            if [[ -z "${rebuild_date}" ]]; then
              continue
            fi
            bash scripts/render_cron_call.sh "/api/cron/rebuild-season-report?season=${{ steps.resolve.outputs.season }}&date=${rebuild_date}&profile=${{ steps.resolve.outputs.profile }}"
          done <<< "${{ steps.resolve.outputs.rebuild_dates }}"

      - name: Republish rolling season manifests
        run: bash scripts/render_cron_call.sh "/api/cron/republish-season?season=${{ steps.resolve.outputs.season }}&profile=${{ steps.resolve.outputs.profile }}"