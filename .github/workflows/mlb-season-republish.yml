name: MLB Season Republish

on:
  workflow_dispatch:
    inputs:
      rebuild_date:
        description: Optional single date to rebuild before republishing
        required: false
        default: ""
      season:
        description: Season to republish
        required: true
        default: "2026"
      profile:
        description: Betting profile manifest to rebuild
        required: true
        default: retuned

concurrency:
  group: mlb-season-republish
  cancel-in-progress: false

env:
  MLB_BETTING_BASE_URL: ${{ secrets['MLB_BETTING_BASE_URL'] }}
  RENDER_URL: ${{ secrets['RENDER_URL'] }}
  MLB_BETTING_CRON_TOKEN: ${{ secrets['MLB_BETTING_CRON_TOKEN'] }}
  CRON_TOKEN: ${{ secrets['CRON_TOKEN'] }}

jobs:
  republish-season:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          test -n "${MLB_BETTING_BASE_URL}" || (echo 'Missing MLB_BETTING_BASE_URL or RENDER_URL secret' && exit 1)
          test -n "${MLB_BETTING_CRON_TOKEN}" || (echo 'Missing MLB_BETTING_CRON_TOKEN or CRON_TOKEN secret' && exit 1)

      - name: Ping Render cron surface
        run: bash scripts/render_cron_call.sh /api/cron/ping

      - name: Rebuild season day report
        if: ${{ inputs.rebuild_date != '' }}
        run: bash scripts/render_cron_call.sh "/api/cron/rebuild-season-report?season=${{ inputs.season }}&date=${{ inputs.rebuild_date }}&profile=${{ inputs.profile }}"

      - name: Republish rolling season manifests
        run: bash scripts/render_cron_call.sh "/api/cron/republish-season?season=${{ inputs.season }}&profile=${{ inputs.profile }}"